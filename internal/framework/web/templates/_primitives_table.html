{{define "_primitives_table.html"}}
<tbody id="primitives-tbody">
  {{range .Primitives}}
  <tr>
    <td><code>{{.Kind}}</code></td>
    <td><a href="/charter/primitives/{{.Kind}}/{{.ID}}">{{.ID}}</a></td>
    <td>{{.Description}}</td>
    <td class="muted" style="font-size: 0.85em;">{{range .Tags}}<span style="display: inline-block; padding: 1px 6px; margin: 1px 2px 1px 0; border: 1px solid var(--border, #2f3548); border-radius: 8px;">{{.}}</span>{{end}}</td>
    <td class="muted"><code>{{.Path}}</code></td>
  </tr>
  {{else}}
  <tr><td colspan="5" class="muted">no primitives match.</td></tr>
  {{end}}
</tbody>
{{end}}
