{{define "graph.html"}}{{template "layout" .}}{{end}}
{{define "title"}}graph{{end}}
{{define "main"}}
<section class="card">
  <h1>dependency graph</h1>
  <p class="muted">Every primitive + every edge — <code>deps:</code> and <code>traces:</code>. Each kind colored by accent. Rendered in-browser via Mermaid. Loads when scrolled into view.</p>

  <div id="graph-mount"
       class="lazy-mount"
       hx-get="/web/widgets/graph"
       hx-trigger="intersect once"
       hx-swap="innerHTML"
       style="min-height: 280px;">
    <p class="muted" style="text-align:center;padding:6rem 0;">loading graph…</p>
  </div>
</section>
{{end}}
