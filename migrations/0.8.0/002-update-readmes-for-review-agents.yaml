id: 002-update-readmes-for-review-agents
description: |
  Surface review-risk and review-deployment in the documentation that lists the
  default review-* sensors:
  - harness/sensors/README.md — review row in "How sensors fire" + sensor index table.
  - harness/corpus/state/CODEBASE_STATE.md — sensor inventory.
  - harness/README.md — bootstrap action description.
  - harness/adapters/claude-code/lifecycle.md — review row + bootstrap row.
  - harness/adapters/codex/lifecycle.md — sub-agent degradation paragraph.
  - harness/adapters/pi/lifecycle.md — sub-agent degradation block.
  - harness/guides/process/review.md — default review-set line.

  Each op uses replace_block with exact-string match. If a downstream user has
  customized any of these files, the conflict will surface and they merge by hand.

operations:
  - type: replace_block
    path: harness/sensors/README.md
    match: |
      | **review** | review | [review-functional](review-functional.md), [review-security](review-security.md), [spec-adherence](spec-adherence.md) |
    replacement: |
      | **review** | review | [review-functional](review-functional.md), [review-security](review-security.md), [review-risk](review-risk.md), [review-deployment](review-deployment.md), [spec-adherence](spec-adherence.md) |

  - type: replace_block
    path: harness/sensors/README.md
    match: |
      | [review-functional](review-functional.md) | inferential | Agent reviews the diff for logic / behavior bugs |
      | [review-security](review-security.md) | inferential | Agent reviews the diff for security concerns |
    replacement: |
      | [review-functional](review-functional.md) | inferential | Agent reviews the diff for logic / behavior bugs |
      | [review-security](review-security.md) | inferential | Agent reviews the diff for security concerns |
      | [review-risk](review-risk.md) | inferential | Agent reviews the diff for blast radius, reversibility, and coupling risk |
      | [review-deployment](review-deployment.md) | inferential | Agent reviews the diff for deployment safety — migrations, flags, rollback |

  - type: replace_block
    path: harness/corpus/state/CODEBASE_STATE.md
    match: |
      | review-functional | inferential | `<wired \| (none)>` |
      | review-security | inferential | `<wired \| (none)>` |
    replacement: |
      | review-functional | inferential | `<wired \| (none)>` |
      | review-security | inferential | `<wired \| (none)>` |
      | review-risk | inferential | `<wired \| (none)>` |
      | review-deployment | inferential | `<wired \| (none)>` |

  - type: replace_block
    path: harness/README.md
    match: |
      - **bootstrap** — initial audit of a fresh install. Detects stack, frameworks, and libraries; seeds `corpus/idioms/<stack>/` and `guides/idioms/<stack>/`; scaffolds `corpus/domain/product-shape.md`; initializes `corpus/state/` (including the Frameworks & libraries table); confirms sensor commands; and **inventories guides and sensors of both kinds** — populating `guides/computational/` with the language servers, formatters, and editor enforcement the stack supports, and recording which inferential sensors (review-functional, review-security, spec-adherence) the active adapter can run. Post-bootstrap, every guide and sensor that applies to the project is in place. Anything that requires install-time setup (a config file, a binary, an agent setting) is exposed as a flag on `keystone init` rather than scaffolded silently.
    replacement: |
      - **bootstrap** — initial audit of a fresh install. Detects stack, frameworks, and libraries; seeds `corpus/idioms/<stack>/` and `guides/idioms/<stack>/`; scaffolds `corpus/domain/product-shape.md`; initializes `corpus/state/` (including the Frameworks & libraries table); confirms sensor commands; and **inventories guides and sensors of both kinds** — populating `guides/computational/` with the language servers, formatters, and editor enforcement the stack supports, and recording which inferential sensors (review-functional, review-security, review-risk, review-deployment, spec-adherence) the active adapter can run. Post-bootstrap, every guide and sensor that applies to the project is in place. Anything that requires install-time setup (a config file, a binary, an agent setting) is exposed as a flag on `keystone init` rather than scaffolded silently.

  - type: replace_block
    path: harness/adapters/claude-code/lifecycle.md
    match: |
      | **review** | `/keystone:review` slash command | Spawns `review-functional` and `review-security` sub-agents in parallel on the diff. |
    replacement: |
      | **review** | `/keystone:review` slash command | Spawns `review-functional`, `review-security`, `review-risk`, and `review-deployment` sub-agents in parallel on the diff. |

  - type: replace_block
    path: harness/adapters/claude-code/lifecycle.md
    match: |
      | **bootstrap** | `/keystone:bootstrap` slash command | One-time initial scaffold. Detects stack, frameworks, and libraries; seeds corpus (idioms/<stack>/, state/), paired guides (idioms/<stack>/); confirms sensor commands; **inventories computational guides** (LSPs, formatters, editor enforcement) into `guides/computational/`; **classifies sensors** (records which inferential sensors — review-functional, review-security, spec-adherence — this adapter can run, and which computational sensors have a working command). Post-bootstrap, `corpus/state/CODEBASE_STATE.md` lists every guide and sensor wired up. |
    replacement: |
      | **bootstrap** | `/keystone:bootstrap` slash command | One-time initial scaffold. Detects stack, frameworks, and libraries; seeds corpus (idioms/<stack>/, state/), paired guides (idioms/<stack>/); confirms sensor commands; **inventories computational guides** (LSPs, formatters, editor enforcement) into `guides/computational/`; **classifies sensors** (records which inferential sensors — review-functional, review-security, review-risk, review-deployment, spec-adherence — this adapter can run, and which computational sensors have a working command). Post-bootstrap, `corpus/state/CODEBASE_STATE.md` lists every guide and sensor wired up. |

  - type: replace_block
    path: harness/adapters/codex/lifecycle.md
    match: |
      The **review** action would ideally spawn `review-functional` and `review-security` in parallel. Codex doesn't support this natively. When invoked, the review action runs them sequentially in one conversation, then combines findings.
    replacement: |
      The **review** action would ideally spawn `review-functional`, `review-security`, `review-risk`, and `review-deployment` in parallel. Codex doesn't support this natively. When invoked, the review action runs them sequentially in one conversation, then combines findings.

  - type: replace_block
    path: harness/adapters/pi/lifecycle.md
    match: |
      The **review** action would ideally spawn `review-functional` and `review-security` in parallel. Pi doesn't support this natively. Two workable approaches:

      1. **Sequential** (default) — pi runs the review prompt template twice, once per agent role, and combines findings.
    replacement: |
      The **review** action would ideally spawn `review-functional`, `review-security`, `review-risk`, and `review-deployment` in parallel. Pi doesn't support this natively. Two workable approaches:

      1. **Sequential** (default) — pi runs the review prompt template once per agent role, and combines findings.

  - type: replace_block
    path: harness/guides/process/review.md
    match: |
      Spawn every available review agent (named `review-*`) in parallel on the current diff. The default v2 set is `review-functional` and `review-security`; teams may add more (`review-performance`, `review-accessibility`, project-specific reviewers).
    replacement: |
      Spawn every available review agent (named `review-*`) in parallel on the current diff. The default set is `review-functional`, `review-security`, `review-risk`, and `review-deployment`; teams may add more (`review-performance`, `review-accessibility`, project-specific reviewers).
