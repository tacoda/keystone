id: 001-add-review-risk-and-deployment-sensors
description: |
  Add two new inferential review sensors: review-risk (blast radius,
  reversibility, coupling) and review-deployment (schema migrations, feature
  flags, rollback compatibility). Both run during the review phase alongside
  review-functional and review-security.

operations:
  - type: add_file
    path: harness/sensors/review-risk.md
    content: |
      ---
      kind: inferential
      ---

      # Sensor: review-risk

      An agent reads the diff and reports risk concerns — blast radius, reversibility, hot-spot regions, fan-out and shared-state coupling, irreversible side effects.

      - **Trigger** — **review** (review phase).
      - **Inputs** — the diff, the spec, `corpus/state/risk-fingerprints.md` (if present), and any region-relevant context.
      - **Exit condition** — no blocking findings, or the user explicitly accepts the residual risk.
      - **Output** — findings list keyed by file and line, each tagged blocking / nit / note, with the risk dimension referenced (blast radius, reversibility, coupling, side effect).
      - **State writes** — none.

      How the agent is invoked is adapter-specific — sub-agent, separate session, MCP tool, or a checklist prompt — see `harness/adapters/<your-agent>/sensors.md`. The bootstrap action records whether this sensor is available for the project's active adapter.

  - type: add_file
    path: harness/sensors/review-deployment.md
    content: |
      ---
      kind: inferential
      ---

      # Sensor: review-deployment

      An agent reads the diff and reports deployment considerations — schema migration safety (expand-contract), feature-flag gating, environment / config drift, backwards compatibility during rolling deploy, the rollback path.

      - **Trigger** — **review** (review phase).
      - **Inputs** — the diff, the spec, and relevant deployment-sensitive corpus (e.g., `corpus/principles/migrations.md`, `corpus/principles/rollback.md`).
      - **Exit condition** — no blocking findings, or the user explicitly accepts the deployment risk.
      - **Output** — findings list keyed by file and line, each tagged blocking / nit / note, with the deployment concern referenced (schema, flag, config, compatibility, rollback).
      - **State writes** — none.

      How the agent is invoked is adapter-specific — sub-agent, separate session, MCP tool, or a checklist prompt — see `harness/adapters/<your-agent>/sensors.md`. The bootstrap action records whether this sensor is available for the project's active adapter.
