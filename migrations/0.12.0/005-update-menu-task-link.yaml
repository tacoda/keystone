id: 005-update-menu-task-link
description: |
  Update the task link in every shipped menu file to point at the new
  playbooks/task.md location. One replace_block per menu file path; the
  ones that don't exist in this install will surface as conflicts (skipped).
  Users who have hand-edited their menu file should rewrite the task link
  manually.

operations:
  - type: replace_block
    path: CLAUDE.md
    match: "- **[task](harness/actions/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."
    replacement: "- **[task](harness/playbooks/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."

  - type: replace_block
    path: AGENTS.md
    match: "- **[task](harness/actions/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."
    replacement: "- **[task](harness/playbooks/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."

  - type: replace_block
    path: CONVENTIONS.md
    match: "- **[task](harness/actions/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."
    replacement: "- **[task](harness/playbooks/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."

  - type: replace_block
    path: .continuerules
    match: "- **[task](harness/actions/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."
    replacement: "- **[task](harness/playbooks/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."

  - type: replace_block
    path: .goosehints
    match: "- **[task](harness/actions/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."
    replacement: "- **[task](harness/playbooks/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."

  - type: replace_block
    path: cline-instructions.md
    match: "- **[task](harness/actions/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."
    replacement: "- **[task](harness/playbooks/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."

  - type: replace_block
    path: .github/copilot-instructions.md
    match: "- **[task](../harness/actions/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."
    replacement: "- **[task](../harness/playbooks/task.md)** — end-to-end workflow: spec → orient → implementation → check-drift → verify → review."

  - type: replace_block
    path: .cursor/rules/keystone.mdc
