id: 003-update-actions-readme
description: |
  Update harness/actions/README.md — task is now a playbook, so the title,
  intro, kickoff section, and table all change. Adds an override-cascade
  note pointing at the new model.

operations:
  - type: replace_block
    path: harness/actions/README.md
    match: |
      # Lifecycle actions

      Each file here is the **canonical playbook** for one harness lifecycle action. They're agent-agnostic: read by Claude Code, Cursor, Codex, Aider, GitHub Copilot, Continue, Cline, Goose, pi, or any other coding agent the project's menu file points here.

      ## How invocation works

      The agent reads its menu file (`CLAUDE.md`, `AGENTS.md`, `CONVENTIONS.md`, `.continuerules`, `.cursor/rules/keystone.mdc`, etc.) on session start. The menu file lists every action with a one-line description and a link to its playbook here. When the user asks to "run bootstrap" (or "run the bootstrap action," or "do a verify pass"), the agent follows the link and executes the playbook.

      No agent-specific slash commands, rule files, or prompts. One source of truth per action.

      ## Kicking off an entire unit of work

      For the end-to-end lifecycle on a single task, say **"run task on `<ticket-id>`"** (or "run the task workflow"). The agent reads [`task.md`](task.md), which walks `spec → orient → implementation → check-drift → verify → review` and an optional `learn` pass, pausing for confirmation between phases.

      ## The actions

      | Action | Playbook | When |
      |---|---|---|
      | **task** | [`task.md`](task.md) | The kickoff — chains spec → orient → implementation → check-drift → verify → review. |
      | **bootstrap** | [`bootstrap.md`](bootstrap.md) | Once per project — detect stack, seed state, classify sensors. |
    replacement: |
      # Actions

      Each file here is one **action** — a single unit of lifecycle work. Actions are agent-agnostic: read by Claude Code, Cursor, Codex, Aider, GitHub Copilot, Continue, Cline, Goose, pi, or any other coding agent the project's menu file points here.

      For ordered sets of actions, see [`harness/playbooks/`](../playbooks/README.md). For example, the end-to-end task workflow lives at [`harness/playbooks/task.md`](../playbooks/task.md).

      ## How invocation works

      The agent reads its menu file (`CLAUDE.md`, `AGENTS.md`, `CONVENTIONS.md`, `.continuerules`, `.cursor/rules/keystone.mdc`, etc.) on session start. The menu file lists every action with a one-line description and a link. When the user asks to "run bootstrap" (or "run the bootstrap action," or "do a verify pass"), the agent follows the link and executes the action.

      No agent-specific slash commands, rule files, or prompts. One source of truth per action.

      ## The actions

      | Action | File | When |
      |---|---|---|
      | **bootstrap** | [`bootstrap.md`](bootstrap.md) | Once per project — detect stack, seed state, classify sensors. |

  - type: replace_block
    path: harness/actions/README.md
    match: |
      | **policy-audit** | [`policy-audit.md`](policy-audit.md) | Before release or per audit cycle — check codebase against installed policy guides. |
    replacement: |
      | **policy-audit** | [`policy-audit.md`](policy-audit.md) | Before release or per audit cycle — check codebase against installed policy guides; verify org `strict` items aren't being overridden. |

  - type: replace_block
    path: harness/actions/README.md
    match: |
      Each playbook is short (~20–40 lines): the agent reads it, executes the listed activities, and reports back. Deeper context lives in `harness/guides/process/`, `harness/sensors/`, and `harness/learning/`; playbooks forward-link to those when they apply.
    replacement: |
      Each action is short (~20–40 lines): the agent reads it, executes the listed activities, and reports back. Deeper context lives in `harness/guides/process/`, `harness/sensors/`, and `harness/learning/`; actions forward-link to those when they apply.

      ## Override cascade

      For any `<name>.md`, the file that wins at runtime is from the highest-priority tier present, in order: **project → team → org**. A project action at `harness/actions/<name>.md` overrides the same-basename file in any team or org policy unless the higher tier declared that item `strict`. See [`harness/policies/README.md`](../policies/README.md) for the full rule and `keystone policy verify` behavior.
