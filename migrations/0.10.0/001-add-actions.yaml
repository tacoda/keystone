id: 001-add-actions
description: |
  Introduce harness/actions/ — the agent-agnostic lifecycle playbooks. The
  agent reads its menu file at session start, finds an action in the bulleted
  list, follows the link to harness/actions/<action>.md, and executes the
  playbook. Replaces the short-lived per-agent skill/rule/prompt approach
  from 0.9.2 (those consumer-side files are inert post-0.10.0 — see the
  0.10.0 CHANGELOG for cleanup steps).

  Every operation is add_file (idempotent — no-op if content matches; conflict
  if a user has hand-edited a file to diverge).

operations:
  - type: add_file
    path: harness/actions/README.md
    content: |
      # Lifecycle actions

      Each file here is the **canonical playbook** for one harness lifecycle action. They're agent-agnostic: read by Claude Code, Cursor, Codex, Aider, GitHub Copilot, Continue, Cline, Goose, pi, or any other coding agent the project's menu file points here.

      ## How invocation works

      The agent reads its menu file (`CLAUDE.md`, `AGENTS.md`, `CONVENTIONS.md`, `.continuerules`, `.cursor/rules/keystone.mdc`, etc.) on session start. The menu file lists every action with a one-line description and a link to its playbook here. When the user asks to "run bootstrap" (or "run the bootstrap action," or "do a verify pass"), the agent follows the link and executes the playbook.

      No agent-specific slash commands, rule files, or prompts. One source of truth per action.

      ## Kicking off an entire unit of work

      For the end-to-end lifecycle on a single task, say **"run task on `<ticket-id>`"** (or "run the task workflow"). The agent reads [`task.md`](task.md), which walks `spec → orient → implementation → check-drift → verify → review` and an optional `learn` pass, pausing for confirmation between phases.

      ## The actions

      | Action | Playbook | When |
      |---|---|---|
      | **task** | [`task.md`](task.md) | The kickoff — chains spec → orient → implementation → check-drift → verify → review. |
      | **bootstrap** | [`bootstrap.md`](bootstrap.md) | Once per project — detect stack, seed state, classify sensors. |
      | **spec** | [`spec.md`](spec.md) | First action on any task — capture intent + acceptance criteria. |
      | **orient** | [`orient.md`](orient.md) | After spec — load `CODEBASE_STATE.md` and idioms for the touched region; sketch a plan. |
      | **check-drift** | [`check-drift.md`](check-drift.md) | Between implementation and verify — fast drift check on the diff. |
      | **verify** | [`verify.md`](verify.md) | Pre-commit — lint / type-check / test / build / drift / commit-message sensors. |
      | **review** | [`review.md`](review.md) | Post-verify — functional / security / risk / deployment review + spec-adherence. |
      | **learn** | [`learn.md`](learn.md) | Any time something surprising happens — capture to `learning/inbox/`. |
      | **audit** | [`audit.md`](audit.md) | Periodic — dual flywheel (Learning + Pruning). |
      | **synthesize** | [`synthesize.md`](synthesize.md) | After inbox has accumulated — promote into corpus / guides. |
      | **mode** | [`mode.md`](mode.md) | When pacing needs to change — paired / solo / autopilot. |

      Each playbook is short (~20–40 lines): the agent reads it, executes the listed activities, and reports back. Deeper context lives in `harness/guides/process/`, `harness/sensors/`, and `harness/learning/`; playbooks forward-link to those when they apply.

  - type: add_file
    path: harness/actions/task.md
    content: |
      # task

      **End-to-end task workflow.** Orchestrates `spec → orient → (implementation) → check-drift → verify → review` and an optional `learn` pass at the end. The canonical phrase to kick off a unit of work.

      **Invoke as:** "run task on `<ticket-or-description>`" — or just "run the task workflow."

      ## Activities

      The agent walks through each phase below in order. After each phase, **pause for the user's acceptance** before proceeding to the next. Do not race ahead.

      1. **spec** — read [`spec.md`](spec.md). Author the spec, restate intent, list acceptance criteria, list non-goals, flag uncertainty. Save it. **Gate:** explicit user acceptance.
      2. **orient** — read [`orient.md`](orient.md). Read `CODEBASE_STATE.md`, load idioms for the touched region, sketch a plan. **Gate:** explicit user acceptance of the plan.
      3. **implementation** — read [`harness/guides/process/implementation.md`](../guides/process/implementation.md). Make the changes inside the loaded idioms. Iron law: surgical edits only — touch what the spec requires.
      4. **check-drift** — read [`check-drift.md`](check-drift.md). Fast diff-vs-guides comparison before running heavyweight sensors.
      5. **verify** — read [`verify.md`](verify.md). Run lint, type-check, test, build, drift, commit-message sensors in this turn. Iron law: no completion claims without fresh evidence.
      6. **review** — read [`review.md`](review.md). Run functional / security / risk / deployment review (parallel sub-agents if supported) plus spec-adherence against the acceptance criteria.
      7. **learn** *(conditional)* — if something surprising came up during the task, read [`learn.md`](learn.md) and capture it to `learning/inbox/`. Otherwise skip.

      ## Iron laws (carry across every phase)

      - **No proceeding without explicit acceptance criteria.** The spec gate is real.
      - **No completion claims without fresh verification evidence.** Sensors must run this turn.
      - **No commits with failing sensors.** Never `--no-verify`.
      - **No AI attribution** in commits, PRs, or tracker comments.
      - **No silent overwrites** of state files.

      ## Pacing

      Read [`harness/guides/process/modes.md`](../guides/process/modes.md) to learn the current pacing mode (paired / solo / autopilot). In `paired`, confirm before non-trivial edits inside implementation; in `solo`, proceed and ask only at genuine forks; in `autopilot`, execute end-to-end and pause only on iron-law violations or destructive actions.

      ## When *not* to use task

      - One-off questions or short edits that don't need a spec. Skip directly to the relevant action.
      - The very first session on a new project. Run [`bootstrap.md`](bootstrap.md) first so `CODEBASE_STATE.md` exists.
      - Periodic harness hygiene. Use [`audit.md`](audit.md) instead.

  - type: add_file
    path: harness/actions/bootstrap.md
    content: |
      # bootstrap

      **One-time initial harness scaffold.** Detect the project's stack, seed `corpus/state/`, scaffold idiom directories, inventory computational guides, and classify sensors. Run once per project.

      ## Activities

      1. **Detect the stack.** Inspect the repo (`package.json`, `go.mod`, `pyproject.toml`, `Gemfile`, `Cargo.toml`, `requirements.txt`, `build.gradle`, etc.) and list every primary language, framework, and notable library.
      2. **Seed `harness/corpus/state/CODEBASE_STATE.md`.** Record:
         - Detected stacks
         - Tool commands (lint / type-check / test / build / coverage) — actual commands, not placeholders
         - Region map (top-level directories → which stacks they hold)
         - CI platform (GitHub Actions / GitLab CI / etc.)
      3. **Seed stack idioms.** For each detected stack, scaffold `harness/corpus/idioms/<stack>/` and the paired `harness/guides/idioms/<stack>/`. Start with a `README.md` describing the stack; populate idiom files as patterns emerge.
      4. **Inventory computational guides.** Record LSP, formatter, and editor enforcement (`.editorconfig`, pre-commit hooks, etc.) under `harness/guides/computational/`.
      5. **Classify sensors.** For each sensor in `harness/sensors/`, record in `CODEBASE_STATE.md` whether this adapter can run it. Inferential sensors (`review-functional`, `review-security`, `review-risk`, `review-deployment`, `spec-adherence`) and computational sensors get separate sections.

      ## Iron law

      **No silent overwrites of state files.** Propose every diff via the agent's edit primitive; let the user accept or reject each.

      ## When this is done

      `CODEBASE_STATE.md` lists every guide and sensor wired up, and the next session of any action can read it as ground truth.

  - type: add_file
    path: harness/actions/spec.md
    content: |
      # spec

      **Capture intent and acceptance criteria** for a unit of work. First action on any task. Read [`harness/guides/process/spec.md`](../guides/process/spec.md) for the full discipline.

      ## Inputs

      - A tracker card ID (Jira / Linear / GitHub Issues / Asana), **or**
      - A conversation describing the work, **or**
      - A `TODO.md` entry.

      If a tracker card was named, fetch its description via whatever tooling the agent has (MCP server, `gh issue view`, `jira` CLI, web fetch). Copy any acceptance criteria into the spec.

      ## Activities

      1. **Restate the intent** in your own words.
      2. **List acceptance criteria** — explicit, testable bullets a reviewer can verify objectively.
      3. **List non-goals** — what is *not* in scope, to prevent feature creep.
      4. **Flag uncertainty** — open questions the user must answer before planning.
      5. **Save the spec** to `docs/specs/YYYY-MM-DD-<topic>.md` with the frontmatter shape described in `harness/guides/process/spec.md` (if the project has that location; otherwise capture inline in the chat).

      ## Gate

      Do not proceed to planning until the user has explicitly accepted the spec.

      ## Iron law

      **No proceeding without explicit acceptance criteria.** A spec that says "make X better" is not yet a spec.

  - type: add_file
    path: harness/actions/orient.md
    content: |
      # orient

      **Enter the planning phase.** Load codebase state and matching idioms for the touched region, then sketch a plan. Read [`harness/guides/process/planning.md`](../guides/process/planning.md) for the full discipline.

      ## Activities

      1. **Read `harness/corpus/state/CODEBASE_STATE.md`** to learn:
         - Tool commands (lint, type-check, test, build)
         - Stacks present in the codebase
         - Regions and their applicable idioms
      2. **Identify the touched region(s)** for this task. Map them to stacks in `CODEBASE_STATE.md`.
      3. **Load matching idioms** by reading `harness/corpus/idioms/<stack>/*.md` for each stack the task touches.
      4. **Load active migrations** for the touched region (`harness/corpus/state/migrations/active/*.md`).
      5. **Sketch a plan** — step list with a verification check per step.

      ## Gate

      Do not begin implementation until the user has accepted the plan.

      ## What to *not* load

      - Idioms for stacks the task does not touch.
      - Process docs for phases this task is not currently in.

      Orient exists to keep context small and relevant. Reading the entire corpus on every task is what orient prevents.

  - type: add_file
    path: harness/actions/check-drift.md
    content: |
      # check-drift

      **Run the drift sensor on the current diff.** Compare the in-progress changes against loaded harness rules. Fast pre-verify check. Read [`harness/sensors/drift.md`](../sensors/drift.md) and [`harness/guides/process/implementation.md`](../guides/process/implementation.md).

      ## Activities

      1. **Identify the diff** — `git diff`, the staged changes, or the in-progress edits.
      2. **List which guides apply** — load `harness/guides/idioms/<stack>/*.md` for each touched stack, plus `harness/guides/process/implementation.md` and any active policy guides (`harness/policies/*/guides/`).
      3. **Compare diff to guides** — line by line, surface violations or hot drift signals.
      4. **Report findings** — one bullet per drift. Cite the guide that was violated.

      ## When to invoke

      Between **implementation** and **verify**. Faster and cheaper than the full verify pass; meant to catch obvious drifts before sensors run.

  - type: add_file
    path: harness/actions/verify.md
    content: |
      # verify

      **Run the verification sensors** — lint, type-check, test, build, drift, commit-message. Pre-commit gate. Read [`harness/guides/process/verification.md`](../guides/process/verification.md).

      ## Activities

      Run every sensor classified as runnable in `harness/corpus/state/CODEBASE_STATE.md`, **in this turn** (no stale evidence). For each sensor:

      1. **lint** — [`harness/sensors/lint.md`](../sensors/lint.md). Invoke the project's lint command.
      2. **type-check** — [`harness/sensors/type-check.md`](../sensors/type-check.md). Invoke the type-check command. Skip if no type checker.
      3. **test** — [`harness/sensors/test.md`](../sensors/test.md). Invoke the test command. Fresh run.
      4. **build** — [`harness/sensors/build.md`](../sensors/build.md). Invoke the build command.
      5. **drift** — [`harness/sensors/drift.md`](../sensors/drift.md). Compare diff to loaded guides.
      6. **commit-message** — [`harness/sensors/commit-message.md`](../sensors/commit-message.md). Inspect the proposed message before `git commit`.

      Show the actual tool output for each. Do not claim a sensor passed without producing its output this turn.

      ## Iron law

      **No completion claims without fresh verification evidence.** Sensors must run in this turn.

      ## On failure

      Return to **implementation**. Do not "fix forward" inside verify. After the fix, re-invoke verify in a fresh turn.

  - type: add_file
    path: harness/actions/review.md
    content: |
      # review

      **Run the four review sensors on the current diff.** Semantic check, post-verify. Read [`harness/guides/process/review.md`](../guides/process/review.md).

      ## Activities

      Run the four review sensors. If the agent supports parallel sub-agents (Claude Code, etc.), spawn them concurrently — **one sub-agent per sensor, all in a single message** — and combine their findings. Agents without sub-agent parallelism run the sensors sequentially.

      | Sensor | Doc |
      |---|---|
      | review-functional | [`harness/sensors/review-functional.md`](../sensors/review-functional.md) |
      | review-security | [`harness/sensors/review-security.md`](../sensors/review-security.md) |
      | review-risk | [`harness/sensors/review-risk.md`](../sensors/review-risk.md) |
      | review-deployment | [`harness/sensors/review-deployment.md`](../sensors/review-deployment.md) |

      Also run **spec-adherence** ([`harness/sensors/spec-adherence.md`](../sensors/spec-adherence.md)) if a spec was authored — walk acceptance criteria line by line against the diff.

      ## Output

      Single combined finding list, grouped by sensor, with severity tags.

      ## Gate

      Don't ship until the review findings are addressed (fix, ignore-with-reason, or punt to a follow-up issue).

  - type: add_file
    path: harness/actions/learn.md
    content: |
      # learn

      **Capture a learning candidate** from a surprise, an incident, or a review finding. Writes to `harness/learning/inbox/` for later synthesis. Read [`harness/learning/README.md`](../learning/README.md).

      ## Activities

      Write a candidate to `harness/learning/inbox/<timestamp>-<slug>.md` where:

      - `<timestamp>` is `YYYY-MM-DD-HHMM` in UTC
      - `<slug>` is a short kebab-case description of the insight

      The candidate file uses this shape:

      ```markdown
      ---
      captured: <ISO date>
      source: <what triggered this — review finding, surprise during implementation, etc.>
      proposed-layer: <corpus/principles | guides/idioms/<stack> | guides/process | sensor>
      ---

      ## What happened

      <concrete observation — code, output, or interaction>

      ## Why it matters

      <the principle, idiom, or rule this implies>

      ## Proposed change

      <the smallest harness edit that would prevent the next incident>
      ```

      ## Gate

      Learn writes only to the inbox. Promotion into corpus / guides happens in **synthesize**, not here. Capture liberally; prune aggressively later.

  - type: add_file
    path: harness/actions/audit.md
    content: |
      # audit

      **Full dual-flywheel audit.** Learning (capture from review) and Pruning (remove dead rules). Periodic. Read [`harness/README.md`](../README.md) (flywheels section) and [`harness/learning/README.md`](../learning/README.md).

      ## Learning flywheel

      1. Walk `harness/learning/inbox/` and flag candidates that should be promoted.
      2. Run review sensors on recent commits — surface patterns that should become guides.
      3. Capture findings as new inbox entries (see [`learn.md`](learn.md)).

      ## Pruning flywheel

      1. **Stale rules** — list guides in `harness/guides/` that no diff has touched in N months (`git log -- harness/guides/`). Flag for review.
      2. **Dead idioms** — list idioms in `harness/corpus/idioms/<stack>/` whose stack is no longer present in `CODEBASE_STATE.md`.
      3. **Risk fingerprint** — read [`harness/sensors/risk-fingerprint.md`](../sensors/risk-fingerprint.md) and update `harness/corpus/state/risk-fingerprints.md`.
      4. **Traffic topology** — read [`harness/sensors/traffic-topology.md`](../sensors/traffic-topology.md) and update `harness/corpus/state/traffic-topology.md`.

      ## Output

      One report with two sections (Learn / Prune), each listing concrete proposed harness edits. Propose every state-file diff before applying; do not silently overwrite.

  - type: add_file
    path: harness/actions/synthesize.md
    content: |
      # synthesize

      **Promote learning-inbox candidates into the right corpus or guide layer.** Read [`harness/learning/README.md`](../learning/README.md).

      ## Activities

      For each file in `harness/learning/inbox/`:

      1. **Read the candidate.** Note its `proposed-layer` frontmatter.
      2. **Decide the destination:**
         - Universal principle → `harness/policies/universal/corpus/principles/<name>.md` and `harness/policies/universal/guides/principles/<name>.md`
         - Stack idiom → `harness/corpus/idioms/<stack>/<name>.md` and `harness/guides/idioms/<stack>/<name>.md`
         - Process rule → `harness/guides/process/<name>.md`
         - Sensor → `harness/sensors/<name>.md`
      3. **Author the corpus and guide pair.** Corpus explains the *why*; guide states the rule.
      4. **Choose the rule tier.** Default: regular rule. Iron law / golden rule only when deviation is genuinely non-negotiable.
      5. **Move the candidate** from `inbox/` to `promoted/` (kept), or `rejected/` (with a one-line reason in the moved file).

      ## Iron law

      **No silent overwrites.** If a destination already exists, propose a diff and let the user merge.

      ## Gate

      Synthesize is where the harness changes shape. Show the user every promotion and removal before applying. After synthesize writes to `guides/`, the active session has stale rules in context — recommend a context reset.

  - type: add_file
    path: harness/actions/mode.md
    content: |
      # mode

      **Switch the harness pacing mode** (paired / solo / autopilot). Read [`harness/guides/process/modes.md`](../guides/process/modes.md).

      ## Activities

      1. If the user named `paired`, `solo`, or `autopilot`, set that as the active mode.
      2. If no mode was named, print the current mode and a one-line description of each.
      3. Update `harness/guides/process/modes.md` in place — replace the "Current mode" line. Do not rewrite the rest of the file.

      ## Mode summary

      - **paired** — user is at the keyboard reviewing every step. Confirm before non-trivial edits.
      - **solo** — user is around but not watching every step. Run sensors and proceed; ask only at genuine forks.
      - **autopilot** — user is away. Execute end-to-end; pause only on iron-law violations or destructive actions.

      ## Iron law

      **No silent overwrites of state files.** Show the `modes.md` diff before saving.
