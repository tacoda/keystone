id: 001-add-sensors
description: |
  Add seven new computational sensors:

  - quality-radar     — five-dimension scorecard aggregating verify + review.
  - code-debt         — surfaces and categorizes debt in the codebase.
  - harness-debt      — surfaces and categorizes debt in the harness itself.
  - stack-drift       — flags divergence between CODEBASE_STATE.md and the repo.
  - secret-scan       — committed-secret detection (gate).
  - vuln-scan         — known-vulnerability scan over declared dependencies.
  - sast              — static analysis for insecure code patterns.

operations:
  - type: add_file
    path: harness/sensors/quality-radar.md
    content: |
      ---
      kind: computational
      ---

      # Sensor: quality-radar

      Aggregates verification and review sensors into a five-dimension scorecard for the current diff (or the whole codebase, on **audit**).

      - **Trigger** — **audit** (codebase-wide) and **review** (diff-scoped).
      - **Inputs** — outputs of [lint](lint.md), [type-check](type-check.md), [test](test.md), [coverage](coverage.md), [review-security](review-security.md), [review-functional](review-functional.md), plus complexity metrics from [risk-fingerprint](risk-fingerprint.md).
      - **Exit condition** — every dimension has a score and at least one cited finding (or an explicit "no findings").
      - **Output** — one score per dimension (`green | yellow | red`) with the citations that drove the score.
      - **State writes** — proposes a diff to `corpus/state/quality-radar.md`. User accepts or edits.

      ## Dimensions

      | Dimension | Driven by | Green | Yellow | Red |
      |---|---|---|---|---|
      | **Type safety** | `type-check` exit + signature churn | no errors | errors confined to one region | errors across regions or `any`/`unknown` proliferation |
      | **Test quality** | `test` exit + `coverage` + test-to-code ratio in diff | passes; coverage stable or up; new code tested | passes; coverage flat with new code | failures, coverage drop, or new code untested |
      | **Readability** | `lint` + complexity from `risk-fingerprint` | lint clean; no new critical-complexity regions | lint warns; one new high-complexity region | lint errors or multiple new critical regions |
      | **Security** | `review-security` findings | none | low-severity only | medium or higher |
      | **Performance** | hot-path heuristics from `review-functional` + diff size on perf-critical regions (flagged in `CODEBASE_STATE.md`) | no perf-critical touch or no concerns | perf-critical touch, no benchmarks | perf-critical touch with regression signal |

      ## Not a gate

      This is a **scorecard**, not a verification gate. Red on a dimension is a signal to discuss, not an automatic block — the **review** action decides what to do with it. The actual block is whatever the underlying sensor already imposes (a failed `test` blocks regardless of how the radar shades the diff).

  - type: add_file
    path: harness/sensors/code-debt.md
    content: |
      ---
      kind: computational
      ---

      # Sensor: code-debt

      Surfaces and categorizes **debt in the codebase** — the known-suboptimal code the team has chosen to live with, plus the shape of any new debt being added in the current diff.

      Paired sensor: [`harness-debt`](harness-debt.md) — covers debt in the harness itself (stale rules, placeholder bootstrap, empty idiom dirs, etc.). The two are tracked separately on purpose.

      - **Trigger** — **audit** (codebase-wide) and **review** (diff-scoped).
      - **Inputs** — `git grep` for debt markers (`TODO`, `FIXME`, `HACK`, `XXX`, `DEPRECATED`), complexity hotspots from [risk-fingerprint](risk-fingerprint.md), and any debt items already listed in `corpus/state/code-debt.md`.
      - **Exit condition** — every surfaced item is categorized (see Categories) and either matched to an existing ledger entry or proposed as a new one.
      - **Output** — table of debt items: location, category, severity, owner (if known), whether new in this diff.
      - **State writes** — proposes a diff to `corpus/state/code-debt.md`. User accepts or edits.

      ## Categories

      | Category | What it means |
      |---|---|
      | **deliberate** | Known-suboptimal, chosen as a tradeoff. Has an owner and a trigger for revisit. |
      | **drift** | Was once fine; the surrounding code moved and left this stale. |
      | **shortcut** | A recent shortcut taken under time pressure. |
      | **discovery** | Newly noticed; not yet categorized. |

      A `TODO` without a category is automatically `discovery` until **debt-review** triages it.

      ## Severity

      - **load-bearing** — change is dangerous; the surrounding region depends on this exact shape.
      - **noisy** — adds review burden but doesn't constrain change.
      - **stale** — no longer relevant; can be removed without thought.

      ## Anti-noise rule

      Don't surface `TODO` in vendored or generated code (anything excluded from lint). Don't surface debt the ledger already records *unless* its severity changed.

  - type: add_file
    path: harness/sensors/harness-debt.md
    content: |
      ---
      kind: computational
      ---

      # Sensor: harness-debt

      Surfaces **debt in the harness itself** — content that exists but isn't earning its keep. Distinct from [`code-debt`](code-debt.md), which covers debt in the codebase.

      - **Trigger** — **audit** (full sweep). Cheaper subsets can run on demand.
      - **Inputs** — `harness/` tree, `harness/corpus/state/CODEBASE_STATE.md`, `harness/.keystone.lock`, `git log -- harness/`, and the outputs of the sensors classified as available in `CODEBASE_STATE.md`.
      - **Exit condition** — every category below has been swept; each finding is matched to an existing ledger entry or proposed as a new one.
      - **Output** — table of harness-debt items: location, category, severity.
      - **State writes** — proposes a diff to `corpus/state/harness-debt.md`. User accepts or edits.

      ## Categories

      | Category | What it means | How to detect |
      |---|---|---|
      | **stale-rule** | A guide no diff has touched in N months. | `git log --since=N.months.ago -- harness/guides/<file>` is empty. |
      | **dead-idiom** | An idiom directory for a stack no longer in `CODEBASE_STATE.md`. | Compare `harness/corpus/idioms/*` against detected stacks. |
      | **placeholder** | Bootstrap placeholders (`<...>`) left unfilled. | `grep -rE '<[^>]+>' harness/corpus/state/`. |
      | **failing-sensor** | Sensor classified as available in `CODEBASE_STATE.md` but errors when invoked. | Try the recorded command; record exit code. |
      | **empty-shell** | Directory scaffolded by bootstrap (idioms, learning/inbox) that has no real content. | Directory size + non-README file count. |
      | **uncited-policy** | Installed policy whose guides were never referenced in the last N reviews. | Cross-reference policy guide paths against review outputs (or `git log` of review reports). |
      | **unresolved-gap** | `harness/adapters/<agent>/<topic>.md` left as a TODO placeholder past install. | `grep -r 'TODO' harness/adapters/`. |
      | **drifted-state** | `CODEBASE_STATE.md` `last_reconciled` is older than N months OR [stack-drift](stack-drift.md) sensor flagged divergence. | Frontmatter date + stack-drift output. |

      ## Severity

      - **load-bearing** — the harness gives wrong guidance because of this (rules that contradict current code; sensors that claim to run but don't).
      - **noisy** — adds review burden, but agents still produce the right behavior.
      - **stale** — safe to delete; no longer earning attention.

      ## Relationship to the audit action

      `audit.md`'s Pruning flywheel is the canonical action that *acts on* this sensor's output — it triages the ledger and proposes deletions or fixes. This sensor produces the candidates; **audit** decides what to do with them.

      ## Anti-noise rule

      Don't surface items the ledger already records *unless* their severity changed. Don't flag a guide as `stale-rule` if a recent commit touched any rule in the same `guides/<topic>/` directory (sibling-rule touches count as activity).

  - type: add_file
    path: harness/sensors/stack-drift.md
    content: |
      ---
      kind: computational
      ---

      # Sensor: stack-drift

      Detects when the empirical reality of the repo has diverged from what `CODEBASE_STATE.md` records. Re-running bootstrap is **not** the answer — bootstrap is a one-time initial scaffold. When this sensor flags drift, it's a trigger for **audit** to reconcile the relevant parts.

      - **Trigger** — **audit** (full sweep) and on-demand when a change touches a region whose stack signals look off.
      - **Inputs** — `harness/corpus/state/CODEBASE_STATE.md` (declared stacks, regions, tool commands) and the actual repo (`package.json`, `go.mod`, `pyproject.toml`, `Gemfile`, `Cargo.toml`, `requirements.txt`, `build.gradle`, language file extensions per region).
      - **Exit condition** — every declared stack and region has been compared against the repo and either matches or has a drift entry.
      - **Output** — per-divergence row: declared value, observed value, recommended reconciliation.
      - **State writes** — none directly. Findings feed the [harness-debt sensor](harness-debt.md) as `drifted-state` items; **audit**'s Pruning flywheel turns them into ledger entries.

      ## What counts as drift

      | Signal | Drift if |
      |---|---|
      | **Declared stack present** | manifest file for the declared stack no longer exists, or the language has zero files in the region it was attached to. |
      | **Undeclared stack present** | a new manifest exists (e.g., a `pyproject.toml` was added) and no stack of that kind is declared. |
      | **Region map** | a top-level dir in `CODEBASE_STATE.md` doesn't exist on disk, or a top-level dir exists but isn't mapped. |
      | **Tool command** | recorded command exits non-zero with "not found" (binary missing), or its config file (`.eslintrc`, `tsconfig.json`, `pyproject.toml`) is gone. |
      | **CI platform** | recorded platform's config dir (`.github/workflows/`, `.gitlab-ci.yml`) is missing or empty, or a different CI's config exists. |

      ## What does **not** count as drift

      - A stack adopting a new framework within itself (e.g., a TypeScript project switching from Jest to Vitest). That's a tool-command change, not stack drift; bootstrap doesn't need to re-run, the relevant tool entry just gets updated by **audit**.
      - Adding a new directory under an existing region. Region map drift only fires for *top-level* changes.

      ## Why no rebootstrap action

      [`bootstrap`](../actions/bootstrap.md) is a one-time initial seed of state, idioms, and sensor classification. Re-running it would either overwrite human edits or no-op against existing content — neither is useful. Stack drift is an **incremental** problem the **audit** action is built for: reconcile only the parts that drifted, leave the rest alone.

  - type: add_file
    path: harness/sensors/secret-scan.md
    content: |
      ---
      kind: computational
      ---

      # Sensor: secret-scan

      Scans the diff (or repo, on **audit**) for committed secrets — API keys, tokens, private keys, credentials.

      - **Trigger** — **verify** (diff-scoped, gate) and **audit** (history-scoped, advisory).
      - **Inputs** — the secret-scan command from `corpus/state/CODEBASE_STATE.md` (e.g., `gitleaks detect`, `trufflehog filesystem`, `detect-secrets scan`). Tool choice is the project's; the sensor describes the contract.
      - **Exit condition** — exit code 0 and no findings.
      - **Output** — pass/fail. On fail: file, line, and the secret type (the tool's classification, not the secret itself).
      - **State writes** — none. Findings are not recorded in state — that would itself leak.

      ## Configuration

      Tool selection lives in `CODEBASE_STATE.md`. The **bootstrap** action proposes a default based on detected stack (`gitleaks` if no other tool is configured). Allowlists for known-safe patterns (test fixtures, public keys) live wherever the chosen tool reads them (`.gitleaks.toml`, `.secrets.baseline`, etc.) — not in the harness.

      ## On finding a secret

      Failing this sensor is not the end of the work. The committer still needs to:

      1. Rotate the secret at its origin (the secret is now in git history; assume it's compromised).
      2. Remove the secret from working tree.
      3. Re-commit.
      4. Decide whether history rewrite is warranted (usually yes for production secrets, usually no for low-value test fixtures).

      The sensor does not do any of this. It just blocks the commit.

  - type: add_file
    path: harness/sensors/vuln-scan.md
    content: |
      ---
      kind: computational
      ---

      # Sensor: vuln-scan

      Scans declared dependencies for known vulnerabilities (CVEs, advisories).

      - **Trigger** — **verify** (gate, when the lockfile changed) and **audit** (advisory, always).
      - **Inputs** — the vuln-scan command from `corpus/state/CODEBASE_STATE.md` (e.g., `trivy fs`, `npm audit`, `pip-audit`, `bundler-audit`, `cargo audit`, `govulncheck`). Tool choice is the project's; the sensor describes the contract.
      - **Exit condition** — exit code 0 and no findings at or above the project's severity threshold (recorded in `CODEBASE_STATE.md`; defaults to `high`).
      - **Output** — pass/fail. On fail: dependency name, version, advisory ID, fixed version.
      - **State writes** — none.

      ## Severity threshold

      Projects set their own threshold in `CODEBASE_STATE.md`. Default: fail on `high` or `critical`. Production-facing services usually drop to `medium`; tooling and CLIs sometimes raise to `critical`.

      ## When a vuln has no fixed version

      If the advisory has no published fix, the failure cannot be resolved by an upgrade. Two paths:

      1. **Mitigate** — confirm the vulnerable code path is unreachable in this project; document in `corpus/state/debt.md` as a `deliberate` debt item with the advisory ID as the revisit trigger.
      2. **Replace** — swap the dependency.

      Either way, suppress the specific advisory in the tool's config (don't broaden the severity threshold) and record why.

      ## Scope

      This sensor scans declared dependencies. It does not scan vendored or transitively-copied code — those are caught by **sast** on the source-tree pass.

  - type: add_file
    path: harness/sensors/sast.md
    content: |
      ---
      kind: computational
      ---

      # Sensor: sast

      Static application security testing — pattern-based detection of insecure code in the source tree (SQL injection, command injection, weak crypto, unsafe deserialization, etc.).

      - **Trigger** — **verify** (diff-scoped, gate) and **audit** (codebase-scoped, advisory).
      - **Inputs** — the SAST command from `corpus/state/CODEBASE_STATE.md` (e.g., `semgrep ci`, `bandit`, `brakeman`, `gosec`). Tool choice is the project's; the sensor describes the contract.
      - **Exit condition** — exit code 0 and no findings at or above the project's severity threshold (recorded in `CODEBASE_STATE.md`; defaults to `error`).
      - **Output** — pass/fail. On fail: file, line, rule ID, message, severity.
      - **State writes** — none.

      ## Diff-scoped vs. codebase-scoped

      - **Verify** runs SAST on the diff only. This is fast and catches new insecurity introduced by the current change.
      - **Audit** runs SAST across the entire source tree. Slower, but catches insecurity that pre-existed the harness or that the **drift** sensor doesn't catch because the diff didn't touch it.

      If your tool has a "diff mode" (e.g., `semgrep ci --baseline-ref`), use it for verify. Otherwise scope manually by passing only the changed paths.

      ## Relationship to review-security

      [`review-security`](review-security.md) is the **inferential** sibling of this sensor: an agent reasoning over the diff. SAST is pattern-based, fast, and catches the things tools are good at. The reviewer catches the things tools miss — design flaws, authorization gaps, business-logic abuse.

      Run both. Treat their findings as complements, not duplicates.
