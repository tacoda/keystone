id: 005-update-readmes
description: |
  Update the three index READMEs that have to reflect the new sensors,
  state files, and actions:

  - harness/sensors/README.md         — "How sensors fire" table + sensor index
  - harness/actions/README.md         — actions table (add debt-review, policy-audit; audit row updated)
  - harness/corpus/state/README.md    — "Files initialized" list

  CODEBASE_STATE.md is intentionally NOT modified — it is a state file users
  edit, so any replace_block on it would conflict for most installs. Wiring
  the new security sensors and harness-debt classification into
  CODEBASE_STATE.md is documented in the CHANGELOG as a manual follow-up
  (or re-run bootstrap and review the proposed diff).

operations:
  - type: replace_block
    path: harness/sensors/README.md
    match: |
      | **verify** | verification | [lint](lint.md), [type-check](type-check.md), [test](test.md), [build](build.md), [drift](drift.md), [commit-message](commit-message.md); proposes state updates from [coverage](coverage.md) |
      | **review** | review | [review-functional](review-functional.md), [review-security](review-security.md), [review-risk](review-risk.md), [review-deployment](review-deployment.md), [spec-adherence](spec-adherence.md) |
      | **audit** | discipline | [drift](drift.md), [coverage](coverage.md), [risk-fingerprint](risk-fingerprint.md), [traffic-topology](traffic-topology.md) |
    replacement: |
      | **verify** | verification | [lint](lint.md), [type-check](type-check.md), [test](test.md), [build](build.md), [drift](drift.md), [commit-message](commit-message.md), [secret-scan](secret-scan.md), [vuln-scan](vuln-scan.md), [sast](sast.md); proposes state updates from [coverage](coverage.md) |
      | **review** | review | [review-functional](review-functional.md), [review-security](review-security.md), [review-risk](review-risk.md), [review-deployment](review-deployment.md), [spec-adherence](spec-adherence.md), [quality-radar](quality-radar.md), [code-debt](code-debt.md) |
      | **audit** | discipline | [drift](drift.md), [coverage](coverage.md), [risk-fingerprint](risk-fingerprint.md), [traffic-topology](traffic-topology.md), [quality-radar](quality-radar.md), [code-debt](code-debt.md), [harness-debt](harness-debt.md), [stack-drift](stack-drift.md), [vuln-scan](vuln-scan.md), [sast](sast.md) |
      | **debt-review** | discipline | [code-debt](code-debt.md) |

  - type: replace_block
    path: harness/sensors/README.md
    match: |
      | [spec-adherence](spec-adherence.md) | inferential | Walks spec ACs against the diff |
      | [review-functional](review-functional.md) | inferential | Agent reviews the diff for logic / behavior bugs |
      | [review-security](review-security.md) | inferential | Agent reviews the diff for security concerns |
      | [review-risk](review-risk.md) | inferential | Agent reviews the diff for blast radius, reversibility, and coupling risk |
      | [review-deployment](review-deployment.md) | inferential | Agent reviews the diff for deployment safety — migrations, flags, rollback |
    replacement: |
      | [quality-radar](quality-radar.md) | computational | Five-dimension scorecard aggregating verify + review sensors |
      | [code-debt](code-debt.md) | computational | Surfaces and categorizes debt in the codebase |
      | [harness-debt](harness-debt.md) | computational | Surfaces debt in the harness itself (stale rules, placeholders, failing sensors, etc.) |
      | [stack-drift](stack-drift.md) | computational | Divergence between `CODEBASE_STATE.md` and actual repo |
      | [secret-scan](secret-scan.md) | computational | Committed-secret detection (gate) |
      | [vuln-scan](vuln-scan.md) | computational | Known-vulnerability scan over declared dependencies |
      | [sast](sast.md) | computational | Static analysis for insecure code patterns |
      | [spec-adherence](spec-adherence.md) | inferential | Walks spec ACs against the diff |
      | [review-functional](review-functional.md) | inferential | Agent reviews the diff for logic / behavior bugs |
      | [review-security](review-security.md) | inferential | Agent reviews the diff for security concerns |
      | [review-risk](review-risk.md) | inferential | Agent reviews the diff for blast radius, reversibility, and coupling risk |
      | [review-deployment](review-deployment.md) | inferential | Agent reviews the diff for deployment safety — migrations, flags, rollback |

  - type: replace_block
    path: harness/actions/README.md
    match: |
      | **learn** | [`learn.md`](learn.md) | Any time something surprising happens — capture to `learning/inbox/`. |
      | **audit** | [`audit.md`](audit.md) | Periodic — dual flywheel (Learning + Pruning). |
      | **synthesize** | [`synthesize.md`](synthesize.md) | After inbox has accumulated — promote into corpus / guides. |
      | **mode** | [`mode.md`](mode.md) | When pacing needs to change — paired / solo / autopilot. |
    replacement: |
      | **learn** | [`learn.md`](learn.md) | Any time something surprising happens — capture to `learning/inbox/`. |
      | **audit** | [`audit.md`](audit.md) | Periodic — dual flywheel (Learning + Pruning); Pruning writes to `corpus/state/harness-debt.md`. |
      | **debt-review** | [`debt-review.md`](debt-review.md) | Periodic — triage `corpus/state/code-debt.md`. |
      | **policy-audit** | [`policy-audit.md`](policy-audit.md) | Before release or per audit cycle — check codebase against installed policy guides. |
      | **synthesize** | [`synthesize.md`](synthesize.md) | After inbox has accumulated — promote into corpus / guides. |
      | **mode** | [`mode.md`](mode.md) | When pacing needs to change — paired / solo / autopilot. |

  - type: replace_block
    path: harness/corpus/state/README.md
    match: |
      Files initialized by the **bootstrap** action:

      - `CODEBASE_STATE.md` — activation map per region: which idioms apply, coverage, last review.
      - `risk-fingerprints.md` — complexity + coupling + coverage patterns per region.
      - `traffic-topology.md` — git signals (churn, recency) + business criticality.
    replacement: |
      Files initialized by the **bootstrap** action:

      - `CODEBASE_STATE.md` — activation map per region: which idioms apply, coverage, last review.
      - `risk-fingerprints.md` — complexity + coupling + coverage patterns per region.
      - `traffic-topology.md` — git signals (churn, recency) + business criticality.
      - `quality-radar.md` — five-dimension scorecard, updated by **audit** and **review**.
      - `code-debt.md` — ledger of debt in the codebase, updated by **debt-review** and **audit**.
      - `harness-debt.md` — ledger of debt in the harness itself, updated by **audit**'s Pruning flywheel.
